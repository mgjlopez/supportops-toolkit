[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# E = pycodestyle errors, F = pyflakes, I = isort
select = ["E", "F", "I"]
ignore = [
    "E501",  # line too long (handled by formatter)
    "F401",  # unused imports (too noisy for a learning project)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]  # module level import not at top (needed for test DB override)
"db/*"    = ["E402"]
