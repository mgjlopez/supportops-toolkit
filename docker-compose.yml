services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: supportops-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD}" -Q "SELECT 1" -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: .
    container_name: supportops-api
    environment:
      DB_SERVER: sqlserver
      DB_NAME: "${DB_NAME}"
      DB_USER: sa
      DB_PASSWORD: "${DB_PASSWORD}"
      APP_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  scheduler:
    build: .
    container_name: supportops-scheduler
    environment:
      DB_SERVER: sqlserver
      DB_NAME: "${DB_NAME}"
      DB_USER: sa
      DB_PASSWORD: "${DB_PASSWORD}"
      MONITOR_INTERVAL: "60"
      ESCALATION_INTERVAL: "120"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - .:/app
    command: python automation/scheduler.py

  prometheus:
    image: prom/prometheus:latest
    container_name: supportops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: supportops-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  sqlserver_data:
  prometheus_data:
  grafana_data:
