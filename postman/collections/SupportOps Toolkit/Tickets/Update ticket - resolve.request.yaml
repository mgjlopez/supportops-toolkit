$kind: http-request
name: 'Update ticket — resolve'
method: PUT
url: '{{base_url}}/tickets/{{ticket_id}}'
description: Marks the ticket as resolved.
order: 9000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "resolved",
      "resolution_notes": "Issue fixed and verified."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200',        () => pm.response.to.have.status(200));
      pm.test('Status is resolved',() => pm.expect(pm.response.json().status).to.eql('resolved'));
