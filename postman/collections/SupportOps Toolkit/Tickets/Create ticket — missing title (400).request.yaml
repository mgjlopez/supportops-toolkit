$kind: http-request
method: POST
url: '{{base_url}}/tickets/'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {"description": "No title provided", "priority": "medium"}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 422 Unprocessable Entity", () => {
        pm.response.to.have.status(422);
      });
      pm.test("Error mentions title field", () => {
        const body = pm.response.json();
        pm.expect(JSON.stringify(body)).to.include("title");
      });
