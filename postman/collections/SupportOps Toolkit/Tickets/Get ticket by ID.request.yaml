$kind: http-request
name: 'Get ticket by ID'
method: GET
url: '{{base_url}}/tickets/{{ticket_id}}'
description: Retrieves a single ticket by its ID.
order: 7000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200',  () => pm.response.to.have.status(200));
      pm.test('ID matches',  () => pm.expect(pm.response.json().id).to.eql(Number(pm.collectionVariables.get('ticket_id'))));
