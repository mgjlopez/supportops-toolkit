$kind: http-request
method: GET
url: '{{base_url}}/tickets/?limit=2&offset=0'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", () => {
        pm.response.to.have.status(200);
      });
      pm.test("Response is an array", () => {
        pm.expect(pm.response.json()).to.be.an("array");
      });
      pm.test("Respects limit — max 2 results", () => {
        pm.expect(pm.response.json().length).to.be.at.most(2);
      });
