$kind: http-request
name: 'Create ticket — invalid priority (expect 400)'
method: POST
url: '{{base_url}}/tickets'
description: Sends an invalid priority value to verify the API returns 400.
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Test invalid priority",
      "description": "This request should fail validation.",
      "priority": "urgent",
      "category": "other",
      "reporter": "qa.tester",
      "source": "manual"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 400',          () => pm.response.to.have.status(400));
      pm.test('Has error message',   () => pm.expect(pm.response.json()).to.have.property('detail'));
