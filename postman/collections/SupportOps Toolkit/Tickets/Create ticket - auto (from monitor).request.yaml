$kind: http-request
name: 'Create ticket — auto (from monitor)'
method: POST
url: '{{base_url}}/tickets'
description: Simulates a ticket created by the health monitor.
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Disk usage on FILESERVER01 at 92%",
      "description": "Automated alert: disk C: at 92.1%. Threshold is 85%.",
      "priority": "critical",
      "category": "performance",
      "reporter": "health_monitor",
      "source": "auto"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 201',      () => pm.response.to.have.status(201));
      pm.test('Source is auto',  () => pm.expect(pm.response.json().source).to.eql('auto'));
