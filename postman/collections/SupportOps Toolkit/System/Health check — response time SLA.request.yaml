$kind: http-request
method: GET
url: '{{base_url}}/health'
description: Variant of the Health Check request — same /health endpoint, focused on enforcing a response-time SLA (<200ms).
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Response time is under 200ms", () => {
        pm.expect(pm.response.responseTime).to.be.below(200);
      });
