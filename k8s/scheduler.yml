# scheduler.yml — Background automation (health monitor + escalation engine)
#
# Runs as a single replica — only one scheduler should run at a time
# to avoid duplicate tickets from concurrent health checks.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: supportops
  labels:
    app: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: supportops-api:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "automation/scheduler.py"]
          env:
            - name: DB_SERVER
              value: sqlserver
            - name: APP_ENV
              value: production
            - name: MONITOR_INTERVAL
              value: "60"
            - name: ESCALATION_INTERVAL
              value: "120"
            - name: API_BASE_URL
              value: "http://api:8000"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: supportops-db-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: supportops-db-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supportops-db-secret
                  key: db-password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
