# ingress.yml — Exposes the API outside the cluster.
#
# Requires an Ingress controller (nginx is the most common).
# For minikube: minikube addons enable ingress
#
# After applying, add to your /etc/hosts (or C:\Windows\System32\drivers\etc\hosts):
#   127.0.0.1  supportops.local

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supportops-ingress
  namespace: supportops
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: supportops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
