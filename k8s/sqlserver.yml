# sqlserver.yml — SQL Server 2025 Developer Edition
#
# Uses a PersistentVolumeClaim so data survives pod restarts.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlserver-pvc
  namespace: supportops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
  namespace: supportops
  labels:
    app: sqlserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlserver
  template:
    metadata:
      labels:
        app: sqlserver
    spec:
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2025-latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: "Developer"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supportops-db-secret
                  key: db-password
          volumeMounts:
            - name: sqlserver-storage
              mountPath: /var/opt/mssql
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          # Readiness probe — only mark pod ready when SQL Server accepts connections
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$SA_PASSWORD" -Q "SELECT 1" -C
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
      volumes:
        - name: sqlserver-storage
          persistentVolumeClaim:
            claimName: sqlserver-pvc

---

apiVersion: v1
kind: Service
metadata:
  name: sqlserver
  namespace: supportops
spec:
  selector:
    app: sqlserver
  ports:
    - port: 1433
      targetPort: 1433
  # ClusterIP — only reachable inside the cluster (correct for a DB)
  type: ClusterIP
