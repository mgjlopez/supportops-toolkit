# secret.yml — Database credentials for SupportOps services.
#
# IMPORTANT: Never commit real values to Git.
# Replace the placeholder values below before applying.
#
# To generate a base64-encoded value:
#   echo -n "YourPassword123!" | base64
#
# Apply with:
#   kubectl apply -f k8s/secret.yml -n supportops

apiVersion: v1
kind: Secret
metadata:
  name: supportops-db-secret
  namespace: supportops
type: Opaque
data:
  # echo -n "SupportOpsDB" | base64
  db-name: U3VwcG9ydE9wc0RC
  # echo -n "sa" | base64
  db-user: c2E=
  # Replace with your actual password encoded in base64
  # echo -n "YourStrong!Password123" | base64
  db-password: WW91clN0cm9uZyFQYXNzd29yZDEyMw==
